[PHP]
extension_dir = "C:\php\ext"
extension=curl
extension=mbstring
extension=openssl
extension=pdo_mysql
extension=mysqli
extension=fileinfo
extension=pdo_sqlite

display_errors = On
display_startup_errors = On

; File Uploads
file_uploads = On
upload_max_filesize = 50M
post_max_size = 50M
memory_limit = 128M
max_execution_time = 300

